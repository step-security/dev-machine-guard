name: Bug Report
description: Report a bug in StepSecurity Dev Machine Guard
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.
  - type: input
    id: version
    attributes:
      label: Version
      description: "Run: ./stepsecurity-dev-machine-guard --version"
      placeholder: "1.9.0"
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      description: "Run: sw_vers -productVersion"
      placeholder: "15.2"
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command Run
      description: The exact command you ran
      placeholder: "./stepsecurity-dev-machine-guard --json"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output / Error Messages
      description: Paste relevant output (use --verbose for more detail)
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem
